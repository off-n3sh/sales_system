<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password — Dreamland</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg:      #0a0a0a;
            --surface: #111111;
            --border:  #1f1f1f;
            --gold:    #c9a84c;
            --gold-dim:#8a6e2f;
            --text:    #f0ece4;
            --muted:   #666;
            --dim:     #999;
            --danger:  #e04444;
            --success: #3dba7a;
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image:
                radial-gradient(ellipse 80% 60% at 50% -10%, rgba(201,168,76,0.06) 0%, transparent 70%),
                repeating-linear-gradient(0deg, transparent, transparent 40px, rgba(255,255,255,0.012) 40px, rgba(255,255,255,0.012) 41px),
                repeating-linear-gradient(90deg, transparent, transparent 40px, rgba(255,255,255,0.012) 40px, rgba(255,255,255,0.012) 41px);
            pointer-events: none;
            z-index: 0;
        }

        .wrapper {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 420px;
            padding: 0 24px;
        }

        .brand {
            font-family: 'Playfair Display', serif;
            font-size: 13px;
            font-weight: 700;
            letter-spacing: 0.35em;
            text-transform: uppercase;
            color: var(--gold);
            text-align: center;
            margin-bottom: 48px;
            animation: fadeDown 0.5s ease both;
        }

        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 40px 36px;
            animation: fadeDown 0.5s ease 0.1s both;
        }

        .icon-wrap {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            border: 1px solid rgba(201,168,76,0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 24px;
            font-size: 20px;
            background: rgba(201,168,76,0.06);
        }

        h1 {
            font-family: 'Playfair Display', serif;
            font-size: 22px;
            font-weight: 700;
            text-align: center;
            margin-bottom: 8px;
        }

        .subtitle {
            font-size: 13px;
            font-weight: 300;
            color: var(--dim);
            text-align: center;
            line-height: 1.7;
            margin-bottom: 28px;
            min-height: 40px;
        }

        .steps {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-bottom: 28px;
        }

        .step-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--border);
            transition: all 0.3s;
        }

        .step-dot.active {
            background: var(--gold);
            width: 20px;
            border-radius: 3px;
        }

        .feedback {
            display: none;
            padding: 12px 14px;
            border-radius: 4px;
            font-size: 12px;
            line-height: 1.6;
            margin-bottom: 20px;
            border: 1px solid transparent;
        }

        .feedback.error   { background: rgba(224,68,68,0.08);  border-color: rgba(224,68,68,0.2);  color: var(--danger);  display: block; }
        .feedback.success { background: rgba(61,186,122,0.08); border-color: rgba(61,186,122,0.2); color: var(--success); display: block; }

        .field {
            display: flex;
            flex-direction: column;
            gap: 6px;
            margin-bottom: 16px;
        }

        label {
            font-size: 10px;
            font-weight: 500;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: var(--muted);
        }

        input {
            width: 100%;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 4px;
            padding: 11px 14px;
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            font-size: 13px;
            outline: none;
            transition: border-color 0.15s;
        }

        input:focus       { border-color: var(--gold); }
        input::placeholder{ color: var(--muted); }

        .strength-bar  { height: 2px; background: var(--border); border-radius: 2px; margin-top: 6px; overflow: hidden; }
        .strength-fill { height: 100%; width: 0%; border-radius: 2px; transition: width 0.3s, background 0.3s; }
        .strength-label{ font-size: 10px; color: var(--muted); margin-top: 4px; height: 14px; }

        button[type="submit"] {
            width: 100%;
            background: var(--gold);
            border: none;
            border-radius: 4px;
            padding: 12px;
            color: #000;
            font-family: 'DM Sans', sans-serif;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            letter-spacing: 0.04em;
            transition: background 0.15s, opacity 0.15s;
            margin-top: 8px;
        }

        button[type="submit"]:hover    { background: var(--gold-dim); color: var(--text); }
        button[type="submit"]:disabled { opacity: 0.5; cursor: not-allowed; }

        #step-2 { display: none; }

        #success-screen {
            display: none;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            text-align: center;
            padding: 16px 0;
        }

        #success-screen .check { font-size: 40px; animation: popIn 0.4s cubic-bezier(0.175,0.885,0.32,1.275) both; }
        #success-screen h2 { font-family: 'Playfair Display', serif; font-size: 20px; color: var(--success); }
        #success-screen p  { font-size: 12px; color: var(--dim); }

        .back-link {
            display: block;
            text-align: center;
            margin-top: 24px;
            font-size: 12px;
            color: var(--muted);
            text-decoration: none;
            transition: color 0.15s;
            animation: fadeDown 0.5s ease 0.2s both;
        }

        .back-link:hover { color: var(--dim); }

        @keyframes fadeDown {
            from { opacity: 0; transform: translateY(-8px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        @keyframes popIn {
            from { transform: scale(0.5); opacity: 0; }
            to   { transform: scale(1);   opacity: 1; }
        }
    </style>
</head>
<body>

<div class="wrapper">

    <div class="brand">Dreamland</div>

    <div class="card">
        <div class="icon-wrap">🔑</div>
        <h1>Reset Password</h1>
        <p class="subtitle" id="subtitle">Enter your email to get started.</p>

        <div class="steps">
            <div class="step-dot active" id="dot-1"></div>
            <div class="step-dot" id="dot-2"></div>
        </div>

        <div class="feedback" id="feedback"></div>

        <!-- STEP 1: Email -->
        <div id="step-1">
            <div class="field">
                <label for="email">Email Address</label>
                <input type="email" id="email" placeholder="you@example.com" autofocus>
            </div>
            <button type="submit" id="btn-step-1">Continue</button>
        </div>

        <!-- STEP 2: New password -->
        <div id="step-2">
            <div class="field">
                <label for="new-password">New Password</label>
                <input type="password" id="new-password" placeholder="Min 8 chars, upper, lower, number">
                <div class="strength-bar"><div class="strength-fill" id="strength-fill"></div></div>
                <div class="strength-label" id="strength-label"></div>
            </div>
            <div class="field">
                <label for="confirm-password">Confirm Password</label>
                <input type="password" id="confirm-password" placeholder="Repeat your password">
            </div>
            <button type="submit" id="btn-step-2">Reset Password</button>
        </div>

        <!-- Success -->
        <div id="success-screen">
            <div class="check">✅</div>
            <h2>Password Updated</h2>
            <p>Redirecting you to login...</p>
        </div>
    </div>

    <a href="/auth" class="back-link">← Back to Login</a>

</div>

<script>
    let confirmedEmail = '';

    const feedback      = document.getElementById('feedback');
    const step1         = document.getElementById('step-1');
    const step2         = document.getElementById('step-2');
    const successScreen = document.getElementById('success-screen');
    const subtitle      = document.getElementById('subtitle');
    const dot1          = document.getElementById('dot-1');
    const dot2          = document.getElementById('dot-2');
    const stepsEl       = document.querySelector('.steps');

    function showFeedback(msg, type) {
        feedback.textContent = msg;
        feedback.className   = `feedback ${type}`;
    }

    function clearFeedback() {
        feedback.textContent = '';
        feedback.className   = 'feedback';
    }

    // Password strength meter
    document.getElementById('new-password').addEventListener('input', function () {
        const val   = this.value;
        let score   = 0;
        if (val.length >= 8)          score++;
        if (/[A-Z]/.test(val))        score++;
        if (/[a-z]/.test(val))        score++;
        if (/\d/.test(val))           score++;
        if (/[^A-Za-z0-9]/.test(val)) score++;

        const colors = ['#e04444','#e09244','#c9a84c','#3dba7a','#3dba7a'];
        const labels = ['Too weak','Weak','Fair','Strong','Very strong'];

        document.getElementById('strength-fill').style.width      = ((score / 5) * 100) + '%';
        document.getElementById('strength-fill').style.background = colors[score - 1] || '#333';
        document.getElementById('strength-label').textContent     = val.length ? (labels[score - 1] || '') : '';
    });

    // STEP 1 — verify email exists
    document.getElementById('btn-step-1').addEventListener('click', async () => {
        clearFeedback();
        const email = document.getElementById('email').value.trim();
        if (!email) return;

        const btn       = document.getElementById('btn-step-1');
        btn.disabled    = true;
        btn.textContent = 'Checking...';

        try {
            const res  = await fetch('/api/auth/forgot-password', {
                method:  'POST',
                headers: { 'Content-Type': 'application/json' },
                body:    JSON.stringify({ email })
            });
            const data = await res.json();

            if (data.status === 'found') {
                confirmedEmail        = email;
                step1.style.display   = 'none';
                step2.style.display   = 'block';
                dot1.classList.remove('active');
                dot2.classList.add('active');
                subtitle.textContent  = 'Choose a strong new password.';
                document.getElementById('new-password').focus();
            } else {
                showFeedback('No account found with that email.', 'error');
                btn.disabled    = false;
                btn.textContent = 'Continue';
            }
        } catch {
            showFeedback('Network error. Please try again.', 'error');
            btn.disabled    = false;
            btn.textContent = 'Continue';
        }
    });

    // STEP 2 — submit new password
    document.getElementById('btn-step-2').addEventListener('click', async () => {
        clearFeedback();
        const new_password     = document.getElementById('new-password').value;
        const confirm_password = document.getElementById('confirm-password').value;

        if (!new_password || !confirm_password) return showFeedback('Please fill in both fields.', 'error');
        if (new_password !== confirm_password)   return showFeedback('Passwords do not match.', 'error');

        const btn       = document.getElementById('btn-step-2');
        btn.disabled    = true;
        btn.textContent = 'Updating...';

        try {
            const res  = await fetch('/api/auth/reset-password', {
                method:  'POST',
                headers: { 'Content-Type': 'application/json' },
                body:    JSON.stringify({ email: confirmedEmail, new_password, confirm_password })
            });
            const data = await res.json();

            if (data.status === 'success') {
                step2.style.display         = 'none';
                successScreen.style.display = 'flex';
                subtitle.textContent        = '';
                stepsEl.style.display       = 'none';
                setTimeout(() => { window.location.href = '/auth'; }, 2000);
            } else {
                showFeedback(data.error || 'Reset failed. Try again.', 'error');
                btn.disabled    = false;
                btn.textContent = 'Reset Password';
            }
        } catch {
            showFeedback('Network error. Please try again.', 'error');
            btn.disabled    = false;
            btn.textContent = 'Reset Password';
        }
    });
</script>

</body>
</html>
