<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Under Development</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            color: #e2e8f0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }
        
        /* Subtle animated background */
        .bg-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(circle at 20% 50%, rgba(59, 130, 246, 0.1) 0%, transparent 50%),
                radial-gradient(circle at 80% 80%, rgba(139, 92, 246, 0.1) 0%, transparent 50%);
            animation: shift 8s ease-in-out infinite;
        }
        
        .container {
            text-align: center;
            z-index: 10;
            padding: 40px;
            max-width: 700px;
        }
        
        .icon-container {
            margin-bottom: 40px;
            position: relative;
        }
        
        .icon {
            width: 120px;
            height: 120px;
            margin: 0 auto;
            background: linear-gradient(135deg, #3b82f6 0%, #8b5cf6 100%);
            border-radius: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 60px;
            box-shadow: 0 20px 60px rgba(59, 130, 246, 0.3);
            animation: float 3s ease-in-out infinite;
        }
        
        h1 {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 16px;
            color: #f8fafc;
            letter-spacing: -0.5px;
        }
        
        .subtitle {
            font-size: 1.1rem;
            color: #94a3b8;
            margin-bottom: 40px;
            line-height: 1.6;
        }
        
        .card {
            background: rgba(30, 41, 59, 0.5);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(148, 163, 184, 0.1);
            border-radius: 16px;
            padding: 40px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
        }
        
        .status-items {
            display: flex;
            flex-direction: column;
            gap: 20px;
            text-align: left;
            margin-bottom: 30px;
        }
        
        .status-item {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 1rem;
            color: #cbd5e1;
        }
        
        .status-icon {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            flex-shrink: 0;
        }
        
        .status-icon.complete {
            background: rgba(34, 197, 94, 0.2);
            color: #22c55e;
        }
        
        .status-icon.progress {
            background: rgba(59, 130, 246, 0.2);
            color: #3b82f6;
            animation: pulse 2s ease-in-out infinite;
        }
        
        .progress-container {
            margin-top: 30px;
            padding-top: 30px;
            border-top: 1px solid rgba(148, 163, 184, 0.1);
        }
        
        .progress-label {
            font-size: 0.875rem;
            color: #94a3b8;
            margin-bottom: 12px;
            text-align: center;
        }
        
        .progress-bar {
            width: 100%;
            height: 6px;
            background: rgba(148, 163, 184, 0.1);
            border-radius: 3px;
            overflow: hidden;
        }
        
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #3b82f6 0%, #8b5cf6 100%);
            width: 65%;
            border-radius: 3px;
            animation: shimmer 2s ease-in-out infinite;
        }
        
        @keyframes float {
            0%, 100% {
                transform: translateY(0px);
            }
            50% {
                transform: translateY(-10px);
            }
        }
        
        @keyframes pulse {
            0%, 100% {
                opacity: 1;
                transform: scale(1);
            }
            50% {
                opacity: 0.8;
                transform: scale(1.1);
            }
        }
        
        @keyframes shimmer {
            0% {
                opacity: 1;
            }
            50% {
                opacity: 0.7;
            }
            100% {
                opacity: 1;
            }
        }
        
        @keyframes shift {
            0%, 100% {
                transform: translate(0, 0);
            }
            50% {
                transform: translate(20px, 20px);
            }
        }
        
        @media (max-width: 768px) {
            h1 {
                font-size: 2rem;
            }
            .icon {
                width: 100px;
                height: 100px;
                font-size: 50px;
            }
            .container {
                padding: 20px;
            }
            .card {
                padding: 30px 20px;
            }
        }
    </style>
</head>
<body>
    <div class="bg-overlay"></div>
    
    <div class="container">
        <div class="icon-container">
            <div class="icon">⚙️</div>
        </div>
        
        <h1>Under Development</h1>
        <p class="subtitle">We're working hard to bring you something amazing. This page will be ready soon.</p>
        
        <div class="card">
            <div class="status-items">
                <div class="status-item">
                    <div class="status-icon complete">✓</div>
                    <span>Planning and design completed</span>
                </div>
                <div class="status-item">
                    <div class="status-icon complete">✓</div>
                    <span>Core features implemented</span>
                </div>
                <div class="status-item">
                    <div class="status-icon progress">⋯</div>
                    <span>Testing and refinement in progress</span>
                </div>
            </div>
            
            <div class="progress-container">
                <div class="progress-label">Development Progress</div>
                <div class="progress-bar">
                    <div class="progress-fill"></div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
