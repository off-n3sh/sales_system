<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login — Dreamland</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg:      #0a0a0a;
            --surface: #111111;
            --border:  #1f1f1f;
            --gold:    #c9a84c;
            --gold-dim:#8a6e2f;
            --text:    #f0ece4;
            --muted:   #666;
            --dim:     #999;
            --danger:  #e04444;
            --success: #3dba7a;
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image:
                radial-gradient(ellipse 80% 60% at 50% -10%, rgba(201,168,76,0.06) 0%, transparent 70%),
                repeating-linear-gradient(0deg, transparent, transparent 40px, rgba(255,255,255,0.012) 40px, rgba(255,255,255,0.012) 41px),
                repeating-linear-gradient(90deg, transparent, transparent 40px, rgba(255,255,255,0.012) 40px, rgba(255,255,255,0.012) 41px);
            pointer-events: none;
            z-index: 0;
        }

        .wrapper {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 400px;
            padding: 0 24px;
        }

        .brand {
            font-family: 'Playfair Display', serif;
            font-size: 13px;
            font-weight: 700;
            letter-spacing: 0.35em;
            text-transform: uppercase;
            color: var(--gold);
            text-align: center;
            margin-bottom: 8px;
            animation: fadeDown 0.5s ease both;
        }

        .brand-sub {
            text-align: center;
            font-size: 10px;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: var(--muted);
            margin-bottom: 40px;
            animation: fadeDown 0.5s ease 0.05s both;
        }

        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 36px 32px;
            animation: fadeDown 0.5s ease 0.1s both;
        }

        .card-title {
            font-family: 'Playfair Display', serif;
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 6px;
        }

        .card-sub {
            font-size: 12px;
            color: var(--dim);
            font-weight: 300;
            margin-bottom: 28px;
        }

        .feedback {
            display: none;
            padding: 10px 13px;
            border-radius: 4px;
            font-size: 12px;
            line-height: 1.6;
            margin-bottom: 18px;
            border: 1px solid transparent;
        }

        .feedback.error {
            background: rgba(224,68,68,0.08);
            border-color: rgba(224,68,68,0.2);
            color: var(--danger);
            display: block;
        }

        .field {
            display: flex;
            flex-direction: column;
            gap: 6px;
            margin-bottom: 16px;
        }

        label {
            font-size: 10px;
            font-weight: 500;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: var(--muted);
        }

        input {
            width: 100%;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 4px;
            padding: 11px 14px;
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            font-size: 13px;
            outline: none;
            transition: border-color 0.15s;
        }

        input:focus       { border-color: var(--gold); }
        input::placeholder{ color: var(--muted); }

        button[type="submit"] {
            width: 100%;
            background: var(--gold);
            border: none;
            border-radius: 4px;
            padding: 12px;
            color: #000;
            font-family: 'DM Sans', sans-serif;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            letter-spacing: 0.04em;
            transition: background 0.15s, opacity 0.15s;
            margin-top: 8px;
        }

        button[type="submit"]:hover    { background: var(--gold-dim); color: var(--text); }
        button[type="submit"]:disabled { opacity: 0.5; cursor: not-allowed; }

        .footer-note {
            text-align: center;
            margin-top: 20px;
            font-size: 11px;
            color: var(--muted);
            animation: fadeDown 0.5s ease 0.2s both;
        }

        @keyframes fadeDown {
            from { opacity: 0; transform: translateY(-8px); }
            to   { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

<div class="wrapper">

    <div class="brand">Dreamland</div>
    <div class="brand-sub">Admin Console</div>

    <div class="card">
        <h1 class="card-title">Sign In</h1>
        <p class="card-sub">Restricted access. Admins and managers only.</p>

        <div class="feedback" id="feedback"></div>

        <form id="login-form">
            <div class="field">
                <label for="email">Email</label>
                <input type="email" id="email" placeholder="admin@dreamland.co.ke" autofocus required>
            </div>
            <div class="field">
                <label for="password">Password</label>
                <input type="password" id="password" placeholder="••••••••" required>
            </div>
            <button type="submit" id="submit-btn">Sign In</button>
        </form>
    </div>

    <p class="footer-note">Dreamland Admin · Internal use only</p>

</div>

<script>
    const form      = document.getElementById('login-form');
    const feedback  = document.getElementById('feedback');
    const submitBtn = document.getElementById('submit-btn');

    form.addEventListener('submit', async e => {
        e.preventDefault();
        feedback.className   = 'feedback';
        feedback.textContent = '';

        const email    = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value;

        submitBtn.disabled    = true;
        submitBtn.textContent = 'Signing in...';

        try {
            const res  = await fetch('/admin/login', {
                method:  'POST',
                headers: { 'Content-Type': 'application/json' },
                body:    JSON.stringify({ email, password })
            });
            const data = await res.json();

            if (data.status === 'success') {
                window.location.href = data.redirect || '/admin';
            } else {
                feedback.textContent = data.error || 'Login failed.';
                feedback.className   = 'feedback error';
                submitBtn.disabled    = false;
                submitBtn.textContent = 'Sign In';
            }
        } catch {
            feedback.textContent = 'Network error. Please try again.';
            feedback.className   = 'feedback error';
            submitBtn.disabled    = false;
            submitBtn.textContent = 'Sign In';
        }
    });
</script>

</body>
</html>
