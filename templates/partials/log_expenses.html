{% for exp in items %}
<div class="py-4 flex justify-between items-center border-b border-gray-50 dark:border-gray-700 last:border-0">
    <div class="flex items-center space-x-3">
        <div class="p-2 bg-red-50 dark:bg-red-900/20 text-red-600 rounded-lg">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M15 12H9m12 0a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
        </div>
        <div>
            <p class="font-bold text-gray-800 dark:text-gray-200 text-sm">{{ exp.description }}</p>
            <p class="text-[10px] text-gray-500 uppercase">
                {{ exp.date.strftime('%b %d, %H:%M') if exp.date else 'N/A' }} • {{ exp.category }}
            </p>
        </div>
    </div>
    <div class="text-right">
        <p class="text-sm font-bold text-red-600">- KES {{ "{:,}".format(exp.amount | round(0)) }}</p>
        <p class="text-[9px] text-gray-400">By {{ exp.user_id[:8] if exp.user_id else 'Manager' }}</p>
    </div>
</div>
{% endfor %}
